# Sample workflow for building and deploying an Astro site to GitHub Pages

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundForge - AI Music Video Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #f7f9fc, #f0f9ff);
      color: #1a1a2e;
      line-height: 1.6;
    }
    
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      color: #1a1a2e;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
    }
    
    .logo-text {
      font-weight: bold;
      font-size: 1.25rem;
    }
    
    .nav-button {
      padding: 0.5rem 1.5rem;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .nav-button:hover {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }
    
    .page { display: none; }
    .page.active { display: block; }
    
    .hero {
      margin-top: 6rem;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    
    .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: #f3e8ff;
      color: #a855f7;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    
    h1 {
      font-size: 3rem;
      font-weight: bold;
      background: linear-gradient(90deg, #a855f7, #3b82f6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }
    
    h2 {
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 1rem;
    }
    
    h3 {
      font-size: 1.25rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      font-size: 1.125rem;
      color: #666;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 3rem;
    }
    
    @media (min-width: 640px) {
      .button-group { flex-direction: row; }
    }
    
    .btn {
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }
    
    .btn-primary {
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      color: white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    .btn-primary:hover {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: white;
      color: #1a1a2e;
      border: 2px solid #ddd;
    }
    
    .btn-secondary:hover {
      background: #f9f9f9;
    }
    
    .demo-video {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e1b4b, #3f1d5c, #1e1b4b);
      border-radius: 1rem;
      margin: 2rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .visualizer {
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 10;
    }
    
    .bar {
      width: 4px;
      background: linear-gradient(to top, #ec4899, #a855f7);
      border-radius: 2px;
      animation: pulse 0.8s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { height: 30px; opacity: 1; }
      50% { height: 60px; opacity: 0.7; }
    }
    
    .play-button {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 20;
    }
    
    .play-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }
    
    .play-icon {
      width: 28px;
      height: 28px;
      fill: white;
      margin-left: 3px;
    }
    
    .features {
      max-width: 1200px;
      margin: 4rem auto;
      padding: 0 1.5rem;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    
    .feature-card {
      padding: 1.5rem;
      background: white;
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      transition: all 0.3s;
    }
    
    .feature-card:hover {
      border-color: #a855f7;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      transform: translateY(-5px);
    }
    
    .feature-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    
    .feature-card p {
      color: #666;
      font-size: 0.875rem;
    }
    
    .cta-section {
      max-width: 700px;
      margin: 4rem auto;
      padding: 2rem 1.5rem;
    }
    
    .cta-box {
      background: linear-gradient(90deg, #a855f7, #3b82f6, #ec4899);
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      text-align: center;
      color: white;
    }
    
    .cta-box h2 { color: white; }
    .cta-box p { color: rgba(255, 255, 255, 0.9); margin-bottom: 2rem; }
    
    footer {
      border-top: 1px solid #e5e7eb;
      padding: 2rem 1.5rem;
      background: rgba(255, 255, 255, 0.5);
      margin-top: 4rem;
      text-align: center;
      color: #666;
    }
    
    .generator-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    
    .generator-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    
    @media (min-width: 1024px) {
      .generator-grid { grid-template-columns: 2fr 1fr; }
    }
    
    .section {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid #e5e7eb;
    }
    
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 1rem;
      resize: none;
      margin: 1rem 0;
    }
    
    textarea:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.1);
    }
    
    .input-group {
      display: flex;
      gap: 0.75rem;
    }
    
    .btn-generate {
      flex: 1;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    
    .btn-generate:hover:not(:disabled) {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }
    
    .tab-button {
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      padding: 0.75rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .tab-button.active {
      color: #a855f7;
      border-bottom-color: #a855f7;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }
    
    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    
    .color-option {
      aspect-ratio: 1;
      border-radius: 0.5rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .color-option:hover {
      transform: scale(1.05);
    }
    
    select, input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 1rem;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.1);
    }
    
    .duration-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    
    .duration-btn {
      padding: 0.5rem;
      background: #f5f5f5;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .duration-btn.active {
      background: #a855f7;
      color: white;
    }
    
    .export-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: all 0.2s;
    }
    
    .export-btn:hover {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    .getting-started {
      background: linear-gradient(135deg, #f3e8ff, #eff6ff);
      border: 1px solid #e9d5ff;
      border-radius: 1rem;
      padding: 1.5rem;
    }
    
    .getting-started ul {
      list-style: none;
    }
    
    .getting-started li {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    
    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      width: 0%;
    }
    
    .time-display {
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 0.75rem;
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 1.75rem; }
      h2 { font-size: 1.5rem; }
      .section { padding: 1.5rem; }
    }
  </style>
  </head>
  <body>
    <nav>
    <div class="nav-container">
      <div class="logo" onclick="showPage('home')">
        <div class="logo-icon">🎵</div>
        <div class="logo-text">SoundForge</div>
      </div>
      <button class="nav-button" onclick="showPage('generator')">Generate Now</button>
    </div>
  </nav>

  <div id="home" class="page active">
    <div class="hero">
      <div class="badge">✨ AI-Powered Music Creation</div>
      <h1>Create Music Videos in Seconds</h1>
      <p class="subtitle">Transform your imagination into stunning AI-generated music videos. Describe your vision, customize every detail, and publish to the world instantly.</p>
      <div class="button-group">
        <button class="btn btn-primary" onclick="showPage('generator')">Start Creating →</button>
        <button class="btn btn-secondary" onclick="scrollToFeatures()">Learn More</button>
      </div>
    </div>

    <div class="demo-video">
      <div class="visualizer">
        <div class="bar" style="animation-delay: 0s; height: 40px;"></div>
        <div class="bar" style="animation-delay: 0.1s; height: 50px;"></div>
        <div class="bar" style="animation-delay: 0.2s; height: 60px;"></div>
        <div class="bar" style="animation-delay: 0.3s; height: 50px;"></div>
        <div class="bar" style="animation-delay: 0.4s; height: 70px;"></div>
        <div class="bar" style="animation-delay: 0.5s; height: 60px;"></div>
        <div class="bar" style="animation-delay: 0.6s; height: 50px;"></div>
        <div class="bar" style="animation-delay: 0.7s; height: 40px;"></div>
      </div>
      <button class="play-button" onclick="alert('Click Generate to create your music video!')">
        <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
      </button>
    </div>

    <div id="features" class="features">
      <h2>Powerful Features</h2>
      <p style="color: #666; margin-bottom: 2rem;">Everything you need to create professional music videos</p>
      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          <h3>AI Generation</h3>
          <p>Describe your music video concept and let AI create stunning visuals instantly.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🎨</div>
          <h3>Full Customization</h3>
          <p>Customize colors, effects, tempo, and every aspect of your music video.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🎵</div>
          <h3>Music Creation</h3>
          <p>Compose original music or use AI to generate tracks that match your vision.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📥</div>
          <h3>Download &amp; Export</h3>
          <p>Download your creations in multiple formats for any platform.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">▶️</div>
          <h3>Publish Instantly</h3>
          <p>Share your videos directly to social media and get instant feedback.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">✨</div>
          <h3>Real-time Preview</h3>
          <p>See your changes instantly with live preview of your music video.</p>
        </div>
      </div>
    </div>

    <div class="cta-section">
      <div class="cta-box">
        <h2>Ready to Create?</h2>
        <p>Start creating your AI music videos today. No credit card required to get started.</p>
        <button class="btn btn-primary" onclick="showPage('generator')" style="background: white; color: #a855f7; margin: 0 auto;">Start Creating Now →</button>
      </div>
    </div>

    <footer>
      <p>© 2024 SoundForge. All rights reserved.</p>
    </footer>
  </div>

  <div id="generator" class="page" style="margin-top: 5rem;">
    <div class="generator-container">
      <div class="generator-grid">
        <div>
          <div class="section">
            <h2>Describe Your Music Video</h2>
            <p style="color: #666; font-size: 0.875rem; margin-bottom: 1rem;">Tell us about the music video you want to create. Be as detailed as possible.</p>
            <textarea id="description" placeholder="E.g., 'A vibrant synthwave-themed music video with neon colors, geometric shapes dancing to an upbeat electronic beat'"></textarea>
            <div class="input-group">
              <button class="btn-generate" onclick="generateVideo()">✨ Generate Video</button>
              <button class="btn-generate" style="flex: 0.5; background: #f5f5f5; color: #333;" onclick="resetDescription()">🔄</button>
            </div>
          </div>

          <div id="preview-section" class="section" style="display: none; margin-top: 1.5rem;">
            <h2>Preview</h2>
            <div class="demo-video" style="margin-bottom: 1rem;">
              <div class="visualizer" id="preview-visualizer">
                <div class="bar" style="animation-delay: 0s; height: 40px;"></div>
                <div class="bar" style="animation-delay: 0.1s; height: 50px;"></div>
                <div class="bar" style="animation-delay: 0.2s; height: 60px;"></div>
                <div class="bar" style="animation-delay: 0.3s; height: 50px;"></div>
                <div class="bar" style="animation-delay: 0.4s; height: 70px;"></div>
                <div class="bar" style="animation-delay: 0.5s; height: 60px;"></div>
                <div class="bar" style="animation-delay: 0.6s; height: 50px;"></div>
                <div class="bar" style="animation-delay: 0.7s; height: 40px;"></div>
              </div>
              <button class="play-button" onclick="togglePlay()">
                <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="white"></path></svg>
              </button>
              <div style="position: absolute; bottom: 1rem; left: 1rem; right: 1rem; background: rgba(0, 0, 0, 0.4); border-radius: 0.5rem; padding: 0.75rem;">
                <div class="progress-bar">
                  <div class="progress-fill" id="progress" style="width: 0%;"></div>
                </div>
                <div class="time-display">
                  <span id="current-time">0:00</span>
                  <span>2:00</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div id="customization-section" class="section" style="display: none;">
            <div class="tabs">
              <button class="tab-button active" onclick="switchTab('customize')">🎨 Style</button>
              <button class="tab-button" onclick="switchTab('effects')">✨ Effects</button>
              <button class="tab-button" onclick="switchTab('music')">🎵 Music</button>
            </div>

            <div id="tab-customize" class="tab-content active">
              <div class="form-group">
                <label>Color Theme</label>
                <div class="color-grid">
                  <div class="color-option" style="background: linear-gradient(135deg, #a855f7, #ec4899);"></div>
                  <div class="color-option" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);"></div>
                  <div class="color-option" style="background: linear-gradient(135deg, #f97316, #ef4444);"></div>
                  <div class="color-option" style="background: linear-gradient(135deg, #22c55e, #10b981);"></div>
                </div>
              </div>
              <div class="form-group">
                <label>Style Preset</label>
                <select>
                  <option>Synthwave</option>
                  <option>Cyberpunk</option>
                  <option>Abstract</option>
                  <option>Minimal</option>
                  <option>Nature</option>
                  <option>Retro</option>
                </select>
              </div>
              <div class="form-group">
                <label>Duration</label>
                <div class="duration-grid">
                  <button class="duration-btn">30s</button>
                  <button class="duration-btn">60s</button>
                  <button class="duration-btn active">120s</button>
                  <button class="duration-btn">Custom</button>
                </div>
              </div>
            </div>

            <div id="tab-effects" class="tab-content" style="display: none;">
              <div class="form-group">
                <label><input type="checkbox" checked=""> Bloom Effect</label>
              </div>
              <div class="form-group">
                <label><input type="checkbox" checked=""> Particle System</label>
              </div>
              <div class="form-group">
                <label>Intensity</label>
                <input type="range" min="0" max="100" value="70">
              </div>
              <div class="form-group">
                <label>Motion Speed</label>
                <input type="range" min="0" max="100" value="50">
              </div>
              <div class="form-group">
                <label><input type="checkbox"> Glow Effect</label>
              </div>
            </div>

            <div id="tab-music" class="tab-content" style="display: none;">
              <div class="form-group">
                <label>Generate Music</label>
                <input type="text" placeholder="Describe the music style...">
              </div>
              <div class="form-group">
                <label>BPM (Tempo)</label>
                <input type="number" value="120" min="60" max="200">
              </div>
              <div class="form-group">
                <label>Genre</label>
                <select>
                  <option>Electronic</option>
                  <option>Hip-Hop</option>
                  <option>Pop</option>
                  <option>Rock</option>
                  <option>Ambient</option>
                  <option>Classical</option>
                </select>
              </div>
              <button class="btn-generate" style="width: 100%;">Generate Music Track</button>
            </div>
          </div>

          <div id="export-section" class="section" style="display: none;">
            <h3>📥 Export &amp; Share</h3>
            <button class="export-btn">📥 Download as MP4</button>
            <button class="export-btn">📥 Download as WebM</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.75rem 0;">
              <button class="export-btn" style="margin: 0;">1080p</button>
              <button class="export-btn" style="margin: 0;">4K</button>
            </div>
            <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 1rem 0;">
            <button class="export-btn" style="background: white; color: #ec4899; border: 2px solid #ec4899;">📤 Publish to Web</button>
          </div>

          <div id="getting-started" class="getting-started">
            <h3>🚀 Getting Started</h3>
            <ul>
              <li>✓ Describe your music video concept</li>
              <li>✓ Click "Generate Video" to create</li>
              <li>✓ Customize style, effects, and music</li>
              <li>✓ Download or publish to web</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
  </body>
</html>
